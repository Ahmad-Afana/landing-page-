<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document2</title>
    <link rel="stylesheet" href="css/style2.css" type="text/css">
   <script src="https://kit.fontawesome.com/4bda071269.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="all">

    <div class="div-img"></div>

    <div class="form-box">
      <h1 class="h1-all">Welcome Back <i class="fa-solid fa-hand-sparkles" id="hand-icon"></i></h1>

      <p class="p1-all">
        Today is a new day. it's your day. you shape it. <br>
        Sign in to start managing your projects.
      
      </p>

      <div class="input">
        <label class="label-inputs"> Email </label> <br>
        <input type="email" placeholder="Example@email.com" class="input-email inputs"> <br>

        <label class="label-inputs">Password</label> <br>
        <input type="password" placeholder="At least 8 characters" class="input-password inputs"> <br>

        <a class="a-in-input" href="#" target="_blank">Forgot Password?</a>
      </div>

      <button class="button1">Sign in</button>

      <div class="p2">
    <p class="p1-in-p2">______________</p>

    <p class="p2-in-p2 desktop-text">Or</p>

    <p class="p2-in-p2 mobile-text">Or sign in with</p>

    <p class="p3-in-p2">______________</p>
     </div>

      <div class="button-2-and-3">
        <button class="button2">
          <img src="./img/Google img.png" class="google-img">
          <span class="p-in-button2 p-in-button2 desktop-text">Sign in with Google</span>
          <span class="p-in-button2 p2-in-button2 mobile-text">Google</span>
        </button>
        

        <button class="button3">
          <img src="./img/Facebook img.png" class="Facebook-img">
          <span class="p-in-button3 desktop-text">Sign in with Facebook</span>
           <span class="p-in-button3 mobile-text">Facebook</span>
        </button>
        <br>
       </div>
        
      <div class="div-p3">
        <p class="p3">Don't you have an account? <a class="a-in-p3" href="#">Sign up</a></p>
      </div>
    </div>

    <div class="clearfix"></div>
  </div>
</body>
</html>
